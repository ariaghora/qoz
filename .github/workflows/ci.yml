name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  posix:
    name: ${{ matrix.os }} (${{ matrix.cc }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        cc: [gcc, clang]
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        run: |
          export CC=${{ matrix.cc }}
          make
          make test

  windows:
    name: windows-latest (clang)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-gcc
            make
            findutils
            diffutils
      - name: Build and test
        shell: msys2 {0}
        run: |
          export CC=clang
          make
          make test

  windows-msvc:
    name: windows-latest (msvc)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Install GNU make
        shell: cmd
        run: choco install make --no-progress --yes
      - name: Build and test
        # Git Bash on windows-latest inherits the full Windows PATH
        # set up by ilammy/msvc-dev-cmd, so cl.exe is reachable
        # directly. MSYS2's bash translates PATH through cygpath
        # and drops the MSVC bin directory, which made cl invisible.
        shell: bash
        run: |
          export CC=cl
          make
          make test
